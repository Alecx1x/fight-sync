<!-- @dsCard group="Tale of the Tape" name="Comic Impact (animated)" subtitle="1280x720 · halftone, speed lines, bold outlines, POW burst · plays live" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Tale of the Tape — Comic Impact</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Anton&family=Archivo+Black&display=swap" rel="stylesheet">
<style>
  :root{--red:#ff2e2e;--blue:#2e6bff;--yel:#ffd21e;--ink:#15110d;--paper:#fff7e8;}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#000}
  #stage{position:relative;width:1280px;height:720px;overflow:hidden;background:var(--yel);
    font-family:'Anton',sans-serif;transform-origin:50% 50%}
  /* halftone dots + radial speed lines */
  .bg{position:absolute;inset:0;background:
    radial-gradient(circle at 50% 46%, #fff0bf 0%, var(--yel) 45%, #f3b71e 100%)}
  .halftone{position:absolute;inset:-10%;opacity:.22;
    background-image:radial-gradient(#15110d 22%, transparent 23%);background-size:16px 16px}
  .speed{position:absolute;left:50%;top:50%;width:1900px;height:1900px;margin:-950px 0 0 -950px;z-index:1;pointer-events:none;opacity:.16;
    background:repeating-conic-gradient(from 0deg, #15110d 0deg 1.4deg, transparent 1.4deg 6deg)}
  .frame{position:absolute;inset:0;z-index:16;pointer-events:none;box-shadow:inset 0 0 0 8px var(--ink),inset 0 0 0 12px var(--paper)}

  .panel{position:absolute;top:0;bottom:0;width:62%;overflow:hidden;will-change:transform;z-index:2}
  .panel.left{left:0;clip-path:polygon(0 0,100% 0,82% 100%,0 100%)}
  .panel.right{right:0;clip-path:polygon(18% 0,100% 0,100% 100%,0 100%)}
  .pwall{position:absolute;inset:0}
  .left .pwall{background:repeating-linear-gradient(0deg, #ff5151 0 5px, var(--red) 5px 10px)}
  .right .pwall{background:repeating-linear-gradient(0deg, #5187ff 0 5px, var(--blue) 5px 10px)}
  .pwall::after{content:"";position:absolute;inset:0;opacity:.16;
    background-image:radial-gradient(#15110d 26%, transparent 27%);background-size:13px 13px}
  .reel{position:absolute;inset:0;width:1280px;height:720px;filter:drop-shadow(4px 6px 0 rgba(0,0,0,.55))}

  /* the torn seam follows the SAME diagonal as the red/blue clip-path split (≈13°, centred x≈528) */
  .seam{position:absolute;top:-12%;left:50%;height:124%;width:58px;transform-origin:50% 50%;
    transform:translateX(-50%) translateX(-112px) rotate(13deg);z-index:6;pointer-events:none}
  .seam svg{width:100%;height:100%;display:block}

  .head{position:absolute;top:14px;left:50%;transform:translateX(-50%) rotate(-3deg);z-index:9;will-change:transform,opacity}
  .head .k{font-family:'Bangers';letter-spacing:3px;font-size:46px;color:var(--paper);
    -webkit-text-stroke:5px var(--ink);paint-order:stroke fill;
    text-shadow:5px 5px 0 var(--ink)}
  .head .k em{color:var(--yel);font-style:normal}

  .fr{position:absolute;top:118px;width:44%;padding:0 40px;z-index:8;will-change:transform,opacity}
  .fr.left{left:0;text-align:left}.fr.right{right:0;text-align:right}
  .corner{font-family:'Archivo Black';letter-spacing:2px;font-size:16px;color:var(--paper);-webkit-text-stroke:3px var(--ink);paint-order:stroke fill}
  .name{font-family:'Bangers';font-size:72px;line-height:.9;color:var(--paper);text-transform:uppercase;letter-spacing:2px;
    -webkit-text-stroke:6px var(--ink);paint-order:stroke fill;text-shadow:5px 6px 0 var(--ink)}
  .left .name{color:#ffe08a}.right .name{color:#bcd0ff}
  .stats{margin-top:190px}
  .stat{margin:10px 0}
  .stat .lab{font-family:'Archivo Black';letter-spacing:2px;font-size:12px;color:var(--ink)}
  .stat .val{font-family:'Bangers';font-size:34px;color:var(--paper);line-height:.95;-webkit-text-stroke:4px var(--ink);paint-order:stroke fill}
  .bar{height:11px;margin-top:4px;background:var(--paper);border:3px solid var(--ink);position:relative;overflow:hidden}
  .bar i{position:absolute;top:0;bottom:0;left:0;width:0}
  .left .bar i{background:var(--red)}.right .bar i{left:auto;right:0;background:var(--blue)}
  .right .stat{display:flex;flex-direction:column;align-items:flex-end}
  .handle{position:absolute;bottom:22px;font-family:'Archivo Black';letter-spacing:1px;font-size:15px;color:var(--paper);
    -webkit-text-stroke:3px var(--ink);paint-order:stroke fill;z-index:8}
  .handle.left{left:42px}.handle.right{right:42px}

  .vs{position:absolute;left:50%;top:50%;width:200px;height:200px;margin:-100px 0 0 -100px;z-index:10;
    display:flex;align-items:center;justify-content:center;will-change:transform,opacity}
  .vs .burst{position:absolute;inset:-14px;background:var(--yel);
    clip-path:polygon(50% 0,61% 22%,86% 12%,77% 38%,100% 50%,77% 62%,86% 88%,61% 78%,50% 100%,39% 78%,14% 88%,23% 62%,0 50%,23% 38%,14% 12%,39% 22%);
    box-shadow:0 0 0 6px var(--ink)}
  .vs span{position:relative;font-family:'Bangers';font-size:84px;color:var(--paper);letter-spacing:3px;
    -webkit-text-stroke:7px var(--ink);paint-order:stroke fill;transform:rotate(-6deg)}
  .pow{position:absolute;left:50%;top:50%;width:260px;height:260px;margin:-130px 0 0 -130px;z-index:11;pointer-events:none;opacity:0;
    display:flex;align-items:center;justify-content:center}
  .pow .star{position:absolute;inset:0;background:var(--paper);
    clip-path:polygon(50% 0,61% 22%,86% 12%,77% 38%,100% 50%,77% 62%,86% 88%,61% 78%,50% 100%,39% 78%,14% 88%,23% 62%,0 50%,23% 38%,14% 12%,39% 22%);
    box-shadow:0 0 0 7px var(--ink)}
  .pow span{position:relative;font-family:'Bangers';font-size:62px;color:var(--red);-webkit-text-stroke:6px var(--ink);paint-order:stroke fill;transform:rotate(-8deg)}
  .flash{position:absolute;inset:0;background:#fff;opacity:0;z-index:15;pointer-events:none}
</style>
</head>
<body>
<div id="stage">
  <div class="bg"></div><div class="halftone"></div><div class="speed" id="speed"></div>
  <div class="panel left" id="pL"><div class="pwall"></div><canvas class="reel" id="rL" width="1280" height="720"></canvas></div>
  <div class="panel right" id="pR"><div class="pwall"></div><canvas class="reel" id="rR" width="1280" height="720"></canvas></div>
  <div class="seam" id="seam"><svg viewBox="0 0 54 720" preserveAspectRatio="none"><polygon points="27,0 8,150 34,210 4,360 40,430 10,580 30,640 18,720 54,720 54,0" fill="#15110d"/><polygon points="27,0 12,150 36,210 9,360 42,430 14,580 31,640 22,720 46,720 46,0" fill="#fff7e8"/></svg></div>
  <div class="head" id="head"><div class="k">TALE <em>OF</em> THE TAPE</div></div>
  <div class="fr left" id="fL"><div class="corner">RED CORNER</div><div class="name" id="nL">YOU</div><div class="stats" id="sL"></div></div>
  <div class="handle left" id="hL">@yourchannel</div>
  <div class="fr right" id="fR"><div class="corner">BLUE CORNER</div><div class="name" id="nR">IRON MIKE</div><div class="stats" id="sR"></div></div>
  <div class="handle right" id="hR">THRILL OF THE FIGHT</div>
  <div class="vs" id="vs"><div class="burst"></div><span>VS</span></div>
  <div class="pow" id="pow"><div class="star"></div><span>POW!</span></div>
  <div class="flash" id="flash"></div>
  <div class="frame"></div>
</div>
<script>
const DEMO={durationMs:8000,
  left:{name:"YOU",corner:"RED CORNER",handle:"@yourchannel",stats:[["ELO","1450-1600",.70],["HEIGHT","5'11\"",.66],["STYLE","PRESSURE",null]],frames:[],fps:20},
  right:{name:"IRON MIKE",corner:"BLUE CORNER",handle:"THRILL OF THE FIGHT",stats:[["ELO","1700+",.84],["HEIGHT","5'10\"",.71],["STYLE","PEEK-A-BOO",null]],frames:[],fps:20}};
const M=window.MANIFEST||DEMO, D=M.durationMs||8000; window.SCENE_DURATION=D;
const clamp=(x,a,b)=>Math.max(a,Math.min(b,x)),lerp=(a,b,t)=>a+(b-a)*t;
const eOutCubic=t=>1-Math.pow(1-t,3),eOutBack=t=>{const c=2.2;return 1+(c+1)*Math.pow(t-1,3)+c*Math.pow(t-1,2)},eInCubic=t=>t*t*t,eOutQuint=t=>1-Math.pow(1-t,5);
function seg(ms,t0,t1,from,to,ease){if(ms<=t0)return from;if(ms>=t1)return to;return lerp(from,to,ease((ms-t0)/(t1-t0)));}
const $=id=>document.getElementById(id);
function fillSide(side,data){$('n'+side).textContent=(data.name||'FIGHTER').toUpperCase();
  $('f'+side).querySelector('.corner').textContent=data.corner||(side==='L'?'RED CORNER':'BLUE CORNER');
  $('h'+side).textContent=data.handle||'';const wrap=$('s'+side);wrap.innerHTML='';
  (data.stats||[]).forEach(([lab,val,frac])=>{const d=document.createElement('div');d.className='stat';
    d.innerHTML='<div class="lab">'+lab+'</div><div class="val">'+(val||'')+'</div>'+(frac!=null?'<div class="bar" data-frac="'+frac+'"><i></i></div>':'');wrap.appendChild(d);});}
fillSide('L',M.left);fillSide('R',M.right);
const REEL={L:{imgs:[],fps:(M.left.fps||20),n:0,pw:0,ph:0},R:{imgs:[],fps:(M.right.fps||20),n:0,pw:0,ph:0}};
function preload(side,data){return Promise.all((data.frames||[]).map(src=>new Promise(res=>{const im=new Image();im.onload=()=>res(im);im.onerror=()=>res(null);im.src=src;}))).then(ims=>{ims=ims.filter(Boolean);REEL[side].imgs=ims;REEL[side].n=ims.length;if(ims[0]){REEL[side].pw=data.pw||ims[0].naturalWidth;REEL[side].ph=data.ph||ims[0].naturalHeight;}});}
window.sceneReady=()=>Promise.all([preload('L',M.left),preload('R',M.right)]);
const ctx={L:$('rL').getContext('2d'),R:$('rR').getContext('2d')};
function half(side){const pw=$('pL').clientWidth||794;return side==='L'?pw*0.36:pw*0.64;}
function drawReel(side,ms){const c=ctx[side],R=REEL[side];c.clearRect(0,0,1280,720);
  if(R.n){const idx=Math.floor(ms/1000*R.fps)%R.n,im=R.imgs[idx];const sc=720/R.ph,nw=R.pw*sc;c.drawImage(im,half(side)-nw/2,0,nw,720);}
  else{c.save();c.translate(half(side),150);c.fillStyle='rgba(21,17,13,.55)';c.beginPath();c.ellipse(0,40,70,90,0,0,7);c.fill();c.fillRect(-60,120,120,360);c.restore();}}
const stage=$('stage');
function seekTo(ms){ms=clamp(ms,0,D);
  const inL=seg(ms,0,1000,-1280,0,eOutBack),inR=seg(ms,0,1000,1280,0,eOutBack);
  // big screen shake on the comic impact
  const sk=(ms>930&&ms<1240)?(Math.sin(ms*1.1)*(1-(ms-930)/310)*10):0;
  $('pL').style.transform='translateX('+inL+'px) translateY('+sk+'px)';
  $('pR').style.transform='translateX('+inR+'px) translateY('+(-sk)+'px)';
  drawReel('L',ms);drawReel('R',ms);
  $('speed').style.transform='rotate('+(ms*0.004)+'deg)';
  $('head').style.opacity=seg(ms,150,650,0,1,eOutCubic);
  $('head').style.transform='translateX(-50%) rotate(-3deg) scale('+seg(ms,150,800,.6,1,eOutBack)+')';
  $('fL').style.opacity=seg(ms,500,1050,0,1,eOutCubic);$('fR').style.opacity=seg(ms,650,1200,0,1,eOutCubic);
  $('fL').style.transform='translateX('+seg(ms,500,1150,-30,0,eOutBack)+'px)';
  $('fR').style.transform='translateX('+seg(ms,650,1300,30,0,eOutBack)+'px)';
  $('seam').style.opacity=seg(ms,940,1200,0,1,eOutCubic);
  $('seam').style.transform='translateX(-50%) translateX(-112px) rotate(13deg) scaleX('+seg(ms,940,1200,2.5,1,eOutQuint)+')';
  const vsc=seg(ms,930,1380,0,1,eOutBack);
  $('vs').style.opacity=seg(ms,930,1080,0,1,eOutCubic);
  $('vs').style.transform='scale('+vsc+') rotate('+seg(ms,930,1450,-24,0,eOutBack)+'deg)';
  // POW burst pops at impact then shrinks away
  const pw=seg(ms,940,1150,0,1,eOutBack)-seg(ms,1300,1650,0,1,eInCubic);
  $('pow').style.opacity=clamp(pw,0,1);
  $('pow').style.transform='scale('+(0.5+clamp(pw,0,1)*0.7)+') rotate('+(seg(ms,940,1650,-18,8,eOutCubic))+'deg)';
  document.querySelectorAll('.bar').forEach(b=>{b.querySelector('i').style.width=(seg(ms,1100,1750,0,parseFloat(b.dataset.frac),eOutCubic)*100)+'%';});
  // outro: punch-in zoom + white flash
  const oT=D-1100;
  const fade=seg(ms,D-380,D,0,1,eInCubic);
  stage.style.transform='scale('+seg(ms,oT,D,1,1.16,eInCubic)+') rotate('+seg(ms,oT,D,0,2,eInCubic)+'deg)';
  stage.style.filter=fade>0?('brightness('+(1-fade)+')'):'none';
  $('flash').style.opacity=Math.max(seg(ms,oT,oT+110,0,.95,eOutCubic)-seg(ms,oT+110,oT+340,0,.95,eOutCubic),0);
}
window.seekTo=seekTo;seekTo(0);
if(!window.CAPTURE){window.sceneReady().then(()=>{let t0=null;function loop(ts){if(t0==null)t0=ts;let e=(ts-t0)%(D+600);seekTo(Math.min(e,D));requestAnimationFrame(loop);}requestAnimationFrame(loop);});}
</script>
</body>
</html>
