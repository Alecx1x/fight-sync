<!-- @dsCard group="Tale of the Tape" name="Premium Gold Broadcast (animated)" subtitle="1280x720 · deep black, gold foil, elegant type, lens flare · plays live" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Tale of the Tape — Premium Gold</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Oswald:wght@300;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--g1:#f8ecb0;--g2:#d8b14e;--g3:#9a721f;--bone:#f3eede;--ink:#070604;}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#000}
  #stage{position:relative;width:1280px;height:720px;overflow:hidden;background:#060504;
    font-family:'Oswald',sans-serif;transform-origin:50% 50%}
  .bg{position:absolute;inset:0;background:
    radial-gradient(60% 45% at 50% 36%, rgba(216,177,78,.10), transparent 70%),
    radial-gradient(140% 100% at 50% 0%, #14110a 0%, #0a0805 50%, #050403 100%)}
  .bokeh{position:absolute;inset:0;opacity:.5;background-repeat:no-repeat;
    background-image:
      radial-gradient(circle 4px at 18% 30%, rgba(216,177,78,.7), transparent 60%),
      radial-gradient(circle 3px at 82% 24%, rgba(216,177,78,.5), transparent 60%),
      radial-gradient(circle 6px at 70% 70%, rgba(216,177,78,.35), transparent 60%),
      radial-gradient(circle 3px at 30% 76%, rgba(216,177,78,.45), transparent 60%),
      radial-gradient(circle 5px at 50% 14%, rgba(216,177,78,.4), transparent 60%)}
  .vign{position:absolute;inset:0;z-index:13;pointer-events:none;box-shadow:inset 0 0 240px 80px rgba(0,0,0,.86)}
  .frame{position:absolute;inset:0;z-index:16;pointer-events:none;
    box-shadow:inset 0 0 0 2px rgba(216,177,78,.55),inset 0 0 0 5px rgba(7,6,4,.9)}

  .panel{position:absolute;top:0;bottom:0;width:62%;overflow:hidden;will-change:transform}
  .panel.left{left:0;clip-path:polygon(0 0,100% 0,84% 100%,0 100%)}
  .panel.right{right:0;clip-path:polygon(16% 0,100% 0,100% 100%,0 100%)}
  .pwall{position:absolute;inset:0;background:
    radial-gradient(120% 90% at 30% 8%, #18140c, #0c0a06 60%, #060503 100%)}
  .pwall::after{content:"";position:absolute;inset:0;opacity:.10;mix-blend-mode:overlay;
    background:repeating-linear-gradient(125deg, #fff 0 1px, transparent 1px 9px)}
  .reel{position:absolute;inset:0;width:1280px;height:720px}

  .seam{position:absolute;top:-8%;left:50%;height:116%;width:2px;transform:translateX(-50%) rotate(8deg);
    background:linear-gradient(transparent,var(--g2) 18%,var(--g1) 50%,var(--g2) 82%,transparent);
    box-shadow:0 0 16px 3px rgba(216,177,78,.55),0 0 44px 10px rgba(216,177,78,.25);z-index:6}
  .flare{position:absolute;top:50%;left:50%;width:680px;height:8px;margin:-4px 0 0 -340px;z-index:7;pointer-events:none;opacity:0;
    background:linear-gradient(90deg,transparent,rgba(255,245,210,.9),transparent);filter:blur(2px)}
  .flare b{position:absolute;left:50%;top:50%;width:80px;height:80px;margin:-40px 0 0 -40px;border-radius:50%;
    background:radial-gradient(circle,rgba(255,248,225,.95),transparent 60%)}

  .head{position:absolute;top:30px;left:50%;transform:translateX(-50%);text-align:center;z-index:9;will-change:transform,opacity}
  .head .k{font-family:'Cinzel';font-weight:700;letter-spacing:8px;font-size:25px;
    background:linear-gradient(180deg,var(--g1),var(--g2) 55%,var(--g3));-webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 1px 0 rgba(0,0,0,.7))}
  .head .rule{height:2px;width:0;margin:9px auto 0;background:linear-gradient(90deg,transparent,var(--g2),transparent)}

  .fr{position:absolute;top:112px;width:44%;padding:0 46px;z-index:8;will-change:transform,opacity}
  .fr.left{left:0;text-align:left}.fr.right{right:0;text-align:right}
  .corner{font-family:'Cinzel';font-weight:600;letter-spacing:5px;font-size:14px;
    background:linear-gradient(180deg,var(--g1),var(--g3));-webkit-background-clip:text;background-clip:text;color:transparent}
  .name{font-family:'Cinzel';font-weight:900;font-size:52px;line-height:.98;color:var(--bone);text-transform:uppercase;letter-spacing:1px;
    text-shadow:0 2px 0 #000,0 8px 26px rgba(0,0,0,.6)}
  .stats{margin-top:214px}
  .stat{margin:14px 0}
  .stat .lab{font-family:'Oswald';font-weight:500;letter-spacing:4px;font-size:12px;color:#b59b5e}
  .stat .val{font-family:'Cinzel';font-weight:700;font-size:28px;color:var(--bone);line-height:1.05}
  .bar{height:5px;margin-top:6px;background:rgba(255,255,255,.06);position:relative;overflow:hidden}
  .bar i{position:absolute;top:0;bottom:0;left:0;width:0;background:linear-gradient(90deg,var(--g3),var(--g1));box-shadow:0 0 8px rgba(216,177,78,.6)}
  .right .bar i{left:auto;right:0}
  .right .stat{display:flex;flex-direction:column;align-items:flex-end}
  .handle{position:absolute;bottom:28px;font-family:'Oswald';font-weight:500;letter-spacing:3px;font-size:14px;color:#9a874f;z-index:8}
  .handle.left{left:48px}.handle.right{right:48px}

  .vs{position:absolute;left:50%;top:50%;width:152px;height:152px;margin:-76px 0 0 -76px;z-index:10;
    display:flex;align-items:center;justify-content:center;will-change:transform,opacity}
  .vs .ring{position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 50% 35%,#15110a,#070604);
    border:4px solid transparent;background-clip:padding-box;
    box-shadow:0 0 0 3px var(--g2),0 0 0 7px #0a0805,0 0 30px 6px rgba(216,177,78,.5),inset 0 2px 14px rgba(255,240,200,.18)}
  .vs .ring2{position:absolute;inset:8px;border-radius:50%;border:1px solid rgba(216,177,78,.5)}
  .vs span{position:relative;font-family:'Cinzel';font-weight:900;font-size:64px;
    background:linear-gradient(180deg,var(--g1),var(--g2) 55%,var(--g3));-webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 2px 1px rgba(0,0,0,.8))}
  .flash{position:absolute;inset:0;background:#fff4da;opacity:0;z-index:15;pointer-events:none}
</style>
</head>
<body>
<div id="stage">
  <div class="bg"></div><div class="bokeh"></div>
  <div class="panel left" id="pL"><div class="pwall"></div><canvas class="reel" id="rL" width="1280" height="720"></canvas></div>
  <div class="panel right" id="pR"><div class="pwall"></div><canvas class="reel" id="rR" width="1280" height="720"></canvas></div>
  <div class="seam" id="seam"></div>
  <div class="flare" id="flare"><b></b></div>
  <div class="head" id="head"><div class="k">TALE OF THE TAPE</div><div class="rule" id="rule"></div></div>
  <div class="fr left" id="fL"><div class="corner">RED CORNER</div><div class="name" id="nL">YOU</div><div class="stats" id="sL"></div></div>
  <div class="handle left" id="hL">@yourchannel</div>
  <div class="fr right" id="fR"><div class="corner">BLUE CORNER</div><div class="name" id="nR">IRON MIKE</div><div class="stats" id="sR"></div></div>
  <div class="handle right" id="hR">THRILL OF THE FIGHT</div>
  <div class="vs" id="vs"><div class="ring"></div><div class="ring2"></div><span>VS</span></div>
  <div class="flash" id="flash"></div>
  <div class="vign"></div><div class="frame"></div>
</div>
<script>
const DEMO={durationMs:8000,
  left:{name:"YOU",corner:"RED CORNER",handle:"@yourchannel",stats:[["ELO","1450-1600",.70],["HEIGHT","5'11\"",.66],["STYLE","PRESSURE",null]],frames:[],fps:20},
  right:{name:"IRON MIKE",corner:"BLUE CORNER",handle:"THRILL OF THE FIGHT",stats:[["ELO","1700+",.84],["HEIGHT","5'10\"",.71],["STYLE","PEEK-A-BOO",null]],frames:[],fps:20}};
const M=window.MANIFEST||DEMO, D=M.durationMs||8000; window.SCENE_DURATION=D;
const clamp=(x,a,b)=>Math.max(a,Math.min(b,x)),lerp=(a,b,t)=>a+(b-a)*t;
const eOutCubic=t=>1-Math.pow(1-t,3),eOutBack=t=>{const c=1.5;return 1+(c+1)*Math.pow(t-1,3)+c*Math.pow(t-1,2)},eInCubic=t=>t*t*t,eOutQuint=t=>1-Math.pow(1-t,5);
function seg(ms,t0,t1,from,to,ease){if(ms<=t0)return from;if(ms>=t1)return to;return lerp(from,to,ease((ms-t0)/(t1-t0)));}
const $=id=>document.getElementById(id);
function fillSide(side,data){$('n'+side).textContent=(data.name||'FIGHTER').toUpperCase();
  $('f'+side).querySelector('.corner').textContent=data.corner||(side==='L'?'RED CORNER':'BLUE CORNER');
  $('h'+side).textContent=data.handle||'';const wrap=$('s'+side);wrap.innerHTML='';
  (data.stats||[]).forEach(([lab,val,frac])=>{const d=document.createElement('div');d.className='stat';
    d.innerHTML='<div class="lab">'+lab+'</div><div class="val">'+(val||'')+'</div>'+(frac!=null?'<div class="bar" data-frac="'+frac+'"><i></i></div>':'');wrap.appendChild(d);});}
fillSide('L',M.left);fillSide('R',M.right);
const REEL={L:{imgs:[],fps:(M.left.fps||20),n:0,pw:0,ph:0},R:{imgs:[],fps:(M.right.fps||20),n:0,pw:0,ph:0}};
function preload(side,data){return Promise.all((data.frames||[]).map(src=>new Promise(res=>{const im=new Image();im.onload=()=>res(im);im.onerror=()=>res(null);im.src=src;}))).then(ims=>{ims=ims.filter(Boolean);REEL[side].imgs=ims;REEL[side].n=ims.length;if(ims[0]){REEL[side].pw=data.pw||ims[0].naturalWidth;REEL[side].ph=data.ph||ims[0].naturalHeight;}});}
window.sceneReady=()=>Promise.all([preload('L',M.left),preload('R',M.right)]);
const ctx={L:$('rL').getContext('2d'),R:$('rR').getContext('2d')};
function half(side){const pw=$('pL').clientWidth||794;return side==='L'?pw*0.36:pw*0.64;}
function drawReel(side,ms){const c=ctx[side],R=REEL[side];c.clearRect(0,0,1280,720);
  if(R.n){const idx=Math.floor(ms/1000*R.fps)%R.n,im=R.imgs[idx];const sc=720/R.ph,nw=R.pw*sc;c.drawImage(im,half(side)-nw/2,0,nw,720);}
  else{c.save();c.translate(half(side),150);c.fillStyle='rgba(216,177,78,.18)';c.beginPath();c.ellipse(0,40,70,90,0,0,7);c.fill();c.fillRect(-60,120,120,360);c.restore();}}
const stage=$('stage');
function seekTo(ms){ms=clamp(ms,0,D);
  const inL=seg(ms,0,1050,-1280,0,eOutBack),inR=seg(ms,0,1050,1280,0,eOutBack);
  $('pL').style.transform='translateX('+inL+'px)';$('pR').style.transform='translateX('+inR+'px)';
  drawReel('L',ms);drawReel('R',ms);
  $('head').style.opacity=seg(ms,200,750,0,1,eOutCubic);
  $('head').style.transform='translateX(-50%) translateY('+seg(ms,200,850,-26,0,eOutCubic)+'px)';
  $('rule').style.width=seg(ms,700,1500,0,300,eOutCubic)+'px';
  $('fL').style.opacity=seg(ms,550,1150,0,1,eOutCubic);$('fR').style.opacity=seg(ms,700,1300,0,1,eOutCubic);
  $('fL').style.transform='translateX('+seg(ms,550,1250,-24,0,eOutCubic)+'px)';
  $('fR').style.transform='translateX('+seg(ms,700,1400,24,0,eOutCubic)+'px)';
  $('seam').style.opacity=seg(ms,980,1350,0,1,eOutCubic);
  $('seam').style.transform='translateX(-50%) rotate(8deg) scaleY('+seg(ms,980,1400,.4,1,eOutQuint)+')';
  // lens flare sweep across the seam once
  const fp=seg(ms,1000,1750,-1,1,eOutCubic);
  $('flare').style.opacity=(ms>1000&&ms<1750)?(1-Math.abs(fp))*0.9:0;
  $('flare').style.transform='translateX('+(fp*220)+'px)';
  const vsc=seg(ms,980,1480,0,1,eOutBack);
  $('vs').style.opacity=seg(ms,980,1180,0,1,eOutCubic);
  $('vs').style.transform='scale('+vsc+') rotate('+seg(ms,980,1500,-10,0,eOutBack)+'deg)';
  $('vs').style.marginTop=(-76+Math.sin(ms*0.0019)*3)+'px';
  document.querySelectorAll('.bar').forEach(b=>{b.querySelector('i').style.width=(seg(ms,1150,1950,0,parseFloat(b.dataset.frac),eOutCubic)*100)+'%';});
  // outro: graceful slow push-in + warm flash + fade
  const oT=D-1300;
  const fade=seg(ms,D-500,D,0,1,eInCubic);
  stage.style.transform='scale('+seg(ms,oT,D,1,1.10,eInCubic)+')';
  stage.style.filter=fade>0?('brightness('+(1-fade)+')'):'none';
  $('flash').style.opacity=Math.max(seg(ms,oT,oT+160,0,.7,eOutCubic)-seg(ms,oT+160,oT+420,0,.7,eOutCubic),0);
}
window.seekTo=seekTo;seekTo(0);
if(!window.CAPTURE){window.sceneReady().then(()=>{let t0=null;function loop(ts){if(t0==null)t0=ts;let e=(ts-t0)%(D+600);seekTo(Math.min(e,D));requestAnimationFrame(loop);}requestAnimationFrame(loop);});}
</script>
</body>
</html>
