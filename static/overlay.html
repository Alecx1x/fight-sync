<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>FightSync Overlay</title>
<style>
  /* TRANSPARENT — OBS composites this over the video. No background. */
  html,body{margin:0;height:100%;background:transparent;overflow:hidden;
    font-family:"Segoe UI",system-ui,sans-serif;color:#fff;-webkit-font-smoothing:antialiased}
  #skel{position:absolute;inset:0;width:100%;height:100%}
  #hud{position:absolute;inset:0;pointer-events:none}
  .badge{position:absolute;top:28px;left:28px;display:flex;align-items:center;gap:12px}
  .live{display:flex;align-items:center;gap:8px;background:rgba(226,59,59,.92);padding:7px 14px;
    border-radius:8px;font-weight:800;letter-spacing:1px;font-size:18px;box-shadow:0 4px 18px rgba(0,0,0,.4)}
  .live i{width:11px;height:11px;border-radius:50%;background:#fff;animation:p 1.2s infinite}
  @keyframes p{50%{opacity:.35}}
  .round{background:rgba(13,19,27,.82);padding:7px 14px;border-radius:8px;font-weight:700;font-size:18px;
    border:1px solid rgba(255,255,255,.12)}
  .clock{margin-left:6px;color:#ffd23f;font-variant-numeric:tabular-nums}
  /* live stats badge (top-right) */
  .stats{position:absolute;top:28px;right:28px;display:none;gap:10px;flex-direction:column;align-items:flex-end}
  .stats .s{background:rgba(13,19,27,.82);border:1px solid rgba(255,255,255,.12);border-radius:8px;
    padding:7px 14px;font-size:17px;font-weight:700}
  .stats .s b{color:#6ee882;font-size:20px}
  .stats .s.down b{color:#ff6b6b}
  #card{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;
    transition:opacity .4s}
  #card.show{opacity:1}
  #card .inner{background:rgba(11,14,19,.9);border:2px solid #e23b3b;border-radius:16px;
    padding:34px 60px;font-size:46px;font-weight:900;letter-spacing:2px;text-align:center;
    box-shadow:0 10px 50px rgba(0,0,0,.6)}
  #idle{position:absolute;bottom:24px;left:28px;font-size:13px;color:rgba(255,255,255,.5);
    background:rgba(13,19,27,.6);padding:6px 12px;border-radius:7px}
</style>
</head>
<body>
<canvas id="skel"></canvas>
<div id="hud">
  <div class="badge">
    <div class="live" id="liveBadge" style="display:none"><i></i>LIVE</div>
    <div class="round" id="roundBadge" style="display:none">ROUND <span id="rnum">1</span><span class="clock" id="clock"></span></div>
  </div>
  <div class="stats" id="statsBadge">
    <div class="s"><b id="punches">0</b> punches</div>
    <div class="s" id="guardS">guard <b id="guard">—</b></div>
  </div>
  <div id="card"><div class="inner" id="cardText"></div></div>
  <div id="idle">FightSync overlay connected ✓ — waiting for the broadcast</div>
</div>
<script>
const $=id=>document.getElementById(id);

// ── round / clock / between-round card (polled, low-freq) ──
async function tick(){
  let s; try{ s=await(await fetch("/api/overlay/state")).json(); }catch(e){ return; }
  $("liveBadge").style.display = s.live ? "flex" : "none";
  if(s.live) $("idle").style.display="none";
  const b=$("roundBadge");
  if(s.live && s.phase && s.phase!=="done"){
    b.style.display="block";
    const lbl = s.phase==="rest" ? "REST" : ("ROUND "+(s.round||1));
    b.innerHTML = lbl + '<span class="clock">'+(s.clock?("  "+s.clock):"")+'</span>';
  } else b.style.display="none";
  if(s.card){ $("cardText").textContent=s.card; $("card").classList.add("show"); }
  else $("card").classList.remove("show");
}
tick(); setInterval(tick, 500);

// ── live skeleton + stats over WebSocket (high-freq) ──
const COCO_EDGES=[[5,7],[7,9],[6,8],[8,10],[5,6],[5,11],[6,12],[11,12],[11,13],[13,15],[12,14],[14,16],[0,5],[0,6],[0,1],[0,2],[1,3],[2,4]];
const LEFT=new Set([1,3,5,7,9,11,13,15]), RIGHT=new Set([2,4,6,8,10,12,14,16]);
let live={kpts:null,punches:0,guard:"",running:false};
function connectWS(){
  let ws;
  try{ ws=new WebSocket((location.protocol==="https:"?"wss":"ws")+"://"+location.host+"/ws/overlay"); }
  catch(e){ setTimeout(connectWS,2000); return; }
  ws.onmessage=e=>{ try{ live=JSON.parse(e.data); }catch(_){} };
  ws.onclose=()=>setTimeout(connectWS,1500);
  ws.onerror=()=>{ try{ws.close();}catch(_){} };
}
connectWS();

const sctx=$("skel").getContext("2d");
function drawSkel(){
  const c=$("skel"), W=c.width, H=c.height; sctx.clearRect(0,0,W,H);
  const kp=live.kpts;
  $("statsBadge").style.display = kp ? "flex" : "none";
  if(kp){
    $("idle").style.display="none";
    $("punches").textContent=live.punches;
    $("guard").textContent=live.guard||"—";
    $("guardS").className = "s"+(live.guard==="DOWN"?" down":"");
    const lw=Math.max(3,H/240);
    COCO_EDGES.forEach(([a,b])=>{ if(kp[a]&&kp[b]&&kp[a][2]>0.25&&kp[b][2]>0.25){
      const ax=kp[a][0]*W,ay=kp[a][1]*H,bx=kp[b][0]*W,by=kp[b][1]*H;
      sctx.lineWidth=lw+3; sctx.strokeStyle="rgba(10,10,12,.55)";
      sctx.beginPath(); sctx.moveTo(ax,ay); sctx.lineTo(bx,by); sctx.stroke();
      sctx.lineWidth=lw; sctx.strokeStyle=(LEFT.has(a)&&LEFT.has(b))?"#46d7ff":(RIGHT.has(a)&&RIGHT.has(b))?"#ffaa3c":"#6ee882";
      sctx.beginPath(); sctx.moveTo(ax,ay); sctx.lineTo(bx,by); sctx.stroke();
    }});
    for(let j=0;j<kp.length;j++){ if(kp[j]&&kp[j][2]>0.25){ const x=kp[j][0]*W,y=kp[j][1]*H,r=Math.max(3,H/200);
      sctx.fillStyle="rgba(10,10,12,.55)"; sctx.beginPath(); sctx.arc(x,y,r+1.6,0,7); sctx.fill();
      sctx.fillStyle="#fff"; sctx.beginPath(); sctx.arc(x,y,r,0,7); sctx.fill(); } }
  }
  requestAnimationFrame(drawSkel);
}
function fit(){ const c=$("skel"); c.width=innerWidth; c.height=innerHeight; }
addEventListener("resize", fit); fit();
drawSkel();
</script>
</body>
</html>
